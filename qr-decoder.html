<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 二维码解析工具</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface2: #f9f9f9;
    --border: #e8e8e8;
    --border2: #d4d4d4;
    --accent: #2563eb;
    --accent2: #1d4ed8;
    --text: #1a1a1a;
    --text2: #666666;
    --text3: #aaaaaa;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --success-border: #bbf7d0;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --danger-border: #fecaca;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 660px;
    padding: 1.75rem 1.5rem 1.1rem;
    display: flex;
    align-items: center;
    gap: 11px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--text);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-icon svg { width: 20px; height: 20px; color: white; }

  header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.01em; }
  header p { font-size: 13px; color: var(--text2); margin-top: 2px; }

  .main {
    width: 100%;
    max-width: 660px;
    padding: 1.25rem 1.5rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Tab bar */
  .tabs {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 4px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    background: transparent;
    color: var(--text2);
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }

  .tab.active {
    background: var(--text);
    color: #fff;
  }

  .tab svg { width: 16px; height: 16px; }

  /* Camera panel */
  .camera-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .viewfinder {
    position: relative;
    width: 100%;
    background: #000;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvas { display: none; }

  .vf-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .vf-frame {
    width: min(60%, 260px);
    aspect-ratio: 1;
    position: relative;
  }

  .vf-frame::before, .vf-frame::after,
  .vf-corner-br, .vf-corner-bl {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border-color: rgba(255,255,255,0.9);
    border-style: solid;
  }

  .vf-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .vf-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .vf-corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
  .vf-corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

  .scan-line {
    position: absolute;
    left: 4px; right: 4px;
    height: 2px;
    background: rgba(255,255,255,0.7);
    top: 4px;
    animation: scan 2s linear infinite;
    border-radius: 1px;
  }

  @keyframes scan { 0% { top: 4px; } 100% { top: calc(100% - 6px); } }

  .scan-dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    transition: transform 0.2s;
  }

  .scan-dot.found { transform: translate(-50%,-50%) scale(1); }

  .vf-status {
    position: absolute;
    bottom: 14px; left: 0; right: 0;
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    pointer-events: none;
  }

  .camera-placeholder {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    background: #fafafa;
    color: var(--text3);
    font-size: 14px;
  }

  .camera-placeholder svg { width: 48px; height: 48px; opacity: 0.3; }

  .cam-controls {
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-top: 1px solid var(--border);
  }

  .btn {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    transition: all 0.12s;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }

  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--text);
    border-color: transparent;
    color: white;
  }

  .btn-primary:hover { background: #333; }

  .btn-danger {
    background: var(--danger-bg);
    border-color: var(--danger-border);
    color: var(--danger);
  }

  .btn-danger:hover { background: #fee2e2; }

  .btn svg { width: 15px; height: 15px; }

  select {
    flex: 1;
    padding: 7px 10px;
    font-size: 13px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 8px;
    outline: none;
    cursor: pointer;
  }

  /* Upload panel */
  .upload-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .drop-zone {
    padding: 3rem 2rem;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    border: 2px dashed var(--border2);
    margin: 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: #eff6ff;
  }

  .drop-zone svg { width: 40px; height: 40px; color: var(--text3); }
  .drop-zone p { font-size: 14px; color: var(--text2); }
  .drop-zone span { font-size: 12px; color: var(--text3); }

  #fileInput { display: none; }

  .upload-preview {
    margin: 16px;
    display: none;
  }

  .upload-preview img {
    width: 100%;
    border-radius: var(--radius);
    max-height: 300px;
    object-fit: contain;
    background: var(--bg);
    display: block;
    border: 1px solid var(--border);
  }

  /* Result panel */
  .result-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: none;
  }

  .result-panel.visible { display: block; }

  .result-header {
    padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .result-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.02em;
  }

  .result-badge.ok {
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid var(--success-border);
  }

  .result-badge.ok::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--success); }

  .result-badge.err {
    background: var(--danger-bg);
    color: var(--danger);
    border: 1px solid var(--danger-border);
  }

  .result-type {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
    background: white;
    padding: 2px 8px;
    border-radius: 5px;
    border: 1px solid var(--border);
    font-weight: 500;
  }

  .result-body { padding: 16px; }

  .result-text {
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
    line-height: 1.65;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    white-space: pre-wrap;
    max-height: 240px;
    overflow-y: auto;
  }

  .result-text::-webkit-scrollbar { width: 4px; }
  .result-text::-webkit-scrollbar-track { background: transparent; }
  .result-text::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .result-text::-webkit-scrollbar { width: 3px; }

  .result-actions {
    display: flex; gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .history-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .history-header {
    padding: 11px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
    background: var(--surface2);
  }

  .history-clear { font-size: 12px; color: var(--text3); cursor: pointer; }
  .history-clear:hover { color: var(--danger); }

  .history-list { max-height: 260px; overflow-y: auto; }
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .history-item {
    padding: 11px 16px;
    display: flex; align-items: flex-start; gap: 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
  }

  .history-item:last-child { border-bottom: none; }
  .history-item:hover { background: var(--bg); }

  .history-icon {
    width: 26px; height: 26px; border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .history-icon svg { width: 13px; height: 13px; color: var(--text2); }

  .history-content { flex: 1; min-width: 0; }
  .history-text { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .empty-state {
    padding: 2rem;
    text-align: center;
    font-size: 13px;
    color: var(--text3);
  }

  .tip {
    font-size: 12px;
    color: var(--text3);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 6px;
  }

  .tip svg { width: 13px; height: 13px; flex-shrink: 0; }

  a.result-link {
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
  }

  a.result-link:hover { text-decoration: underline; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(70px);
    background: var(--text); border: 1px solid rgba(0,0,0,0.15);
    color: #fff; font-size: 13px; padding: 8px 16px;
    border-radius: 20px; pointer-events: none;
    transition: transform 0.2s, opacity 0.2s;
    opacity: 0; z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  @media (max-width: 500px) {
    header, .main { padding-left: 1rem; padding-right: 1rem; }
    .drop-zone { padding: 2rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <path d="M14 14h3v3h-3zM17 17h4M17 14v4M21 14v3"/>
    </svg>
  </div>
  <div>
    <h1>QR 二维码解析工具</h1>
    <p>摄像头扫描 · 图片上传 · 精准识别</p>
  </div>
</header>

<div class="main">

  <div class="tabs">
    <button class="tab" id="tabCamera" onclick="switchTab('camera')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      摄像头扫描
    </button>
    <button class="tab active" id="tabUpload" onclick="switchTab('upload')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      上传图片
    </button>
  </div>

  <!-- Camera panel -->
  <div class="camera-panel" id="cameraPanel" style="display:none">
    <div class="viewfinder">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="canvas"></canvas>

      <div class="camera-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <p>点击「开始扫描」启动摄像头</p>
        <span>支持 QR Code、微信二维码、支付码等</span>
      </div>

      <div class="vf-overlay" id="vfOverlay" style="display:none">
        <div class="vf-frame">
          <div class="vf-corner-br"></div>
          <div class="vf-corner-bl"></div>
          <div class="scan-line" id="scanLine"></div>
          <div class="scan-dot" id="scanDot"></div>
        </div>
      </div>

      <div class="vf-status" id="vfStatus"></div>
    </div>

    <div class="cam-controls">
      <button class="btn btn-primary" id="btnStart" onclick="startCamera()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
        开始扫描
      </button>
      <button class="btn btn-danger" id="btnStop" onclick="stopCamera()" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><rect x="9" y="9" width="6" height="6"/></svg>
        停止
      </button>
      <select id="cameraSelect" style="display:none"></select>
    </div>

    <div class="tip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      保持摄像头稳定，将二维码置于框内，可自动识别复杂内容
    </div>
  </div>

  <!-- Upload panel -->
  <div class="upload-panel" id="uploadPanel">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3h-3zM17 17h4M17 14v4M21 14v3"/></svg>
      <p>点击或拖拽图片到此处</p>
      <span>支持 PNG · JPG · GIF · WebP · BMP</span>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
    <div class="upload-preview" id="uploadPreview">
      <img id="previewImg" src="" alt="预览">
    </div>
    <div class="tip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      图片越清晰识别率越高；内容复杂的二维码建议使用原图上传
    </div>
  </div>

  <!-- Result -->
  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <span class="result-badge ok" id="resultBadge">识别成功</span>
      <span class="result-type" id="resultType">文本</span>
    </div>
    <div class="result-body">
      <div class="result-text" id="resultText"></div>
      <div class="result-actions">
        <button class="btn" onclick="copyResult()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          复制内容
        </button>
        <button class="btn" id="openLinkBtn" onclick="openLink()" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          打开链接
        </button>
        <button class="btn" onclick="clearResult()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          清除
        </button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="history-panel">
    <div class="history-header">
      <span>历史记录</span>
      <span class="history-clear" onclick="clearHistory()">清除全部</span>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">暂无扫描记录</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let stream = null;
let scanning = false;
let animFrame = null;
let lastResult = '';
let currentResult = '';
let history = JSON.parse(localStorage.getItem('qr_history') || '[]');
let cameras = [];

function switchTab(tab) {
  document.getElementById('tabCamera').classList.toggle('active', tab === 'camera');
  document.getElementById('tabUpload').classList.toggle('active', tab === 'upload');
  document.getElementById('cameraPanel').style.display = tab === 'camera' ? '' : 'none';
  document.getElementById('uploadPanel').style.display = tab === 'upload' ? '' : 'none';
  if (tab === 'upload') stopCamera();
}

async function startCamera() {
  try {
    const constraints = {
      video: {
        facingMode: 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();

    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('vfOverlay').style.display = 'flex';
    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnStop').style.display = '';
    document.getElementById('vfStatus').textContent = '正在识别...';

    await listCameras();
    scanning = true;
    lastResult = '';
    scanLoop();
  } catch (e) {
    showToast('无法访问摄像头：' + e.message);
  }
}

async function listCameras() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    cameras = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cameraSelect');
    if (cameras.length > 1) {
      sel.innerHTML = cameras.map((c, i) => `<option value="${c.deviceId}">${c.label || '摄像头 ' + (i + 1)}</option>`).join('');
      sel.style.display = '';
      sel.onchange = () => switchCamera(sel.value);
    }
  } catch (_) {}
}

async function switchCamera(deviceId) {
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
  } catch (e) { showToast('切换摄像头失败'); }
}

function stopCamera() {
  scanning = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const video = document.getElementById('video');
  video.srcObject = null;
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('vfOverlay').style.display = 'none';
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('cameraSelect').style.display = 'none';
  document.getElementById('vfStatus').textContent = '';
  document.getElementById('scanDot').classList.remove('found');
}

function scanLoop() {
  if (!scanning) return;
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (vw > 0 && vh > 0) {
      canvas.width = vw; canvas.height = vh;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, vw, vh);
      const imageData = ctx.getImageData(0, 0, vw, vh);

      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });

      if (!code) {
        const code2 = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'invertFirst'
        });
        if (code2 && code2.data !== lastResult) {
          onDecoded(code2.data);
        }
      } else if (code.data !== lastResult) {
        onDecoded(code.data);
      }

      if (!code) {
        document.getElementById('vfStatus').textContent = '正在识别...';
        document.getElementById('scanDot').classList.remove('found');
        document.getElementById('scanLine').style.display = '';
      }
    }
  }
  animFrame = requestAnimationFrame(scanLoop);
}

function onDecoded(text) {
  lastResult = text;
  document.getElementById('vfStatus').textContent = '✓ 识别成功';
  document.getElementById('scanDot').classList.add('found');
  document.getElementById('scanLine').style.display = 'none';
  showResult(text);
  addHistory(text);
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('请选择图片文件'); return; }

  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('uploadPreview').style.display = '';

      const canvas = document.createElement('canvas');
      const maxDim = 2000;
      let w = img.width, h = img.height;

      if (w > maxDim || h > maxDim) {
        const r = Math.min(maxDim / w, maxDim / h);
        w = Math.round(w * r); h = Math.round(h * r);
      }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      let result = tryDecode(ctx, w, h);

      if (!result) {
        const scales = [0.5, 0.75, 1.25, 1.5];
        for (const s of scales) {
          const sw = Math.round(w * s), sh = Math.round(h * s);
          const c2 = document.createElement('canvas');
          c2.width = sw; c2.height = sh;
          const cx = c2.getContext('2d');
          cx.drawImage(img, 0, 0, sw, sh);
          result = tryDecode(cx, sw, sh);
          if (result) break;
        }
      }

      if (!result) {
        const ctx2 = canvas.getContext('2d');
        ctx2.filter = 'contrast(1.5) brightness(1.1)';
        ctx2.drawImage(img, 0, 0, w, h);
        result = tryDecode(ctx2, w, h);
      }

      if (result) {
        showResult(result);
        addHistory(result);
      } else {
        showError('未能识别此图片中的二维码，请确认图片清晰且包含完整二维码');
      }
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function tryDecode(ctx, w, h) {
  const d = ctx.getImageData(0, 0, w, h);
  const r1 = jsQR(d.data, w, h, { inversionAttempts: 'dontInvert' });
  if (r1) return r1.data;
  const r2 = jsQR(d.data, w, h, { inversionAttempts: 'invertFirst' });
  return r2 ? r2.data : null;
}

function detectType(text) {
  if (/^https?:\/\//i.test(text)) return 'URL';
  if (/^mailto:/i.test(text)) return '邮件';
  if (/^tel:/i.test(text)) return '电话';
  if (/^WIFI:/i.test(text)) return 'WiFi';
  if (/^BEGIN:VCARD/i.test(text)) return '名片';
  if (/^smsto:|^sms:/i.test(text)) return '短信';
  if (/^bitcoin:|^ethereum:|^USDT/i.test(text)) return '加密货币';
  if (/^otpauth/i.test(text)) return 'OTP';
  if (/^[A-Za-z0-9+/]{20,}={0,2}$/.test(text.trim())) return 'Base64';
  if (text.length > 200) return '长文本';
  return '文本';
}

function showResult(text) {
  currentResult = text;
  const type = detectType(text);
  const panel = document.getElementById('resultPanel');
  const badge = document.getElementById('resultBadge');
  const typeEl = document.getElementById('resultType');
  const textEl = document.getElementById('resultText');
  const linkBtn = document.getElementById('openLinkBtn');

  badge.className = 'result-badge ok';
  badge.textContent = '识别成功';
  typeEl.textContent = type;

  if (type === 'URL') {
    textEl.innerHTML = `<a class="result-link" href="${escHtml(text)}" target="_blank" rel="noopener">${escHtml(text)}</a>`;
    linkBtn.style.display = '';
  } else {
    textEl.textContent = text;
    linkBtn.style.display = 'none';
  }

  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showError(msg) {
  const panel = document.getElementById('resultPanel');
  document.getElementById('resultBadge').className = 'result-badge err';
  document.getElementById('resultBadge').textContent = '识别失败';
  document.getElementById('resultType').textContent = '—';
  document.getElementById('resultText').textContent = msg;
  document.getElementById('openLinkBtn').style.display = 'none';
  panel.classList.add('visible');
}

function clearResult() {
  document.getElementById('resultPanel').classList.remove('visible');
  currentResult = '';
  lastResult = '';
  document.getElementById('scanDot').classList.remove('found');
  document.getElementById('scanLine').style.display = '';
  document.getElementById('uploadPreview').style.display = 'none';
}

function copyResult() {
  if (!currentResult) return;
  navigator.clipboard.writeText(currentResult).then(() => showToast('已复制到剪贴板'));
}

function openLink() {
  if (currentResult) window.open(currentResult, '_blank', 'noopener');
}

function addHistory(text) {
  const entry = { text, time: Date.now(), type: detectType(text) };
  history = [entry, ...history.filter(h => h.text !== text)].slice(0, 30);
  localStorage.setItem('qr_history', JSON.stringify(history));
  renderHistory();
}

function clearHistory() {
  history = [];
  localStorage.removeItem('qr_history');
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!history.length) {
    list.innerHTML = '<div class="empty-state">暂无扫描记录</div>';
    return;
  }
  list.innerHTML = history.map(h => `
    <div class="history-item" onclick="showResult(${JSON.stringify(h.text)})">
      <div class="history-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <path d="M14 14h3v3h-3zM17 17h4M17 14v4M21 14v3"/>
        </svg>
      </div>
      <div class="history-content">
        <div class="history-text">${escHtml(h.text)}</div>
        <div class="history-meta">${h.type} · ${timeAgo(h.time)}</div>
      </div>
    </div>
  `).join('');
}

function timeAgo(ts) {
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 60) return '刚刚';
  if (s < 3600) return Math.floor(s / 60) + ' 分钟前';
  if (s < 86400) return Math.floor(s / 3600) + ' 小时前';
  return new Date(ts).toLocaleDateString('zh-CN');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Drag & drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const dt = new DataTransfer(); dt.items.add(file);
    document.getElementById('fileInput').files = dt.files;
    handleFile({ target: { files: dt.files, value: '' }, preventDefault: () => {} });
    document.getElementById('fileInput').value = '';
  }
});

// Paste image
document.addEventListener('paste', e => {
  const item = Array.from(e.clipboardData.items).find(i => i.type.startsWith('image/'));
  if (item) {
    const file = item.getAsFile();
    const dt = new DataTransfer(); dt.items.add(file);
    document.getElementById('fileInput').files = dt.files;
    handleFile({ target: { files: dt.files, value: '' } });
    if (document.getElementById('uploadPanel').style.display === 'none') switchTab('upload');
  }
});

renderHistory();
</script>
